name: Build macOS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew install cmake
    
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu) VERBOSE=1 2>&1 | tee build.log || (tail -100 build.log && exit 1)
    
    - name: Create plugin bundle
      run: |
        cd build
        make install DESTDIR=install
        cd install
        tar -czf ../TellyMedia-reborn-macOS-ARM.tar.gz "Documents/VirtualDJ/PluginsMacArm/VideoEffect/TellyMedia-reborn.bundle"
    
    - name: Build PKG installer
      run: |
        chmod +x installer/build_pkg.sh
        installer/build_pkg.sh build/install build
    
    - name: Upload tar.gz artifact
      uses: actions/upload-artifact@v4
      with:
        name: TellyMedia-reborn-macOS-ARM-targz
        path: build/TellyMedia-reborn-macOS-ARM.tar.gz
    
    - name: Upload PKG installer
      uses: actions/upload-artifact@v4
      with:
        name: TellyMedia-reborn-macOS-ARM-pkg
        path: build/TellyMedia-reborn-4.0.0.pkg
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/TellyMedia-reborn-macOS-ARM.tar.gz
          build/TellyMedia-reborn-4.0.0.pkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
